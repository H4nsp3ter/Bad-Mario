<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BAD MARIO - 16-BIT EDITION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
        <div id="crt-overlay"></div>
        <div id="zoom-controls">
            <button id="btn-zoom-out">🔍-</button>
            <button id="btn-zoom-in">🔍+</button>
        </div>
        
        <div id="hud">
            <div class="hud-top">
                <div id="hp-display">
                    <span class="hp-label">HP</span>
                    <div id="health-bar-container">
                        <div id="health-bar-fill"></div>
                    </div>
                </div>
                
                <div id="level-display">LEVEL: <span id="level-value">1</span></div>

                <div id="score-container">
                    <div id="score-display">SCORE: <span id="score-value">000000</span></div>
                    <div id="coin-display">COINS: <span id="coin-value">0</span></div>
                </div>
            </div>

            <div class="hud-bottom">
                <div id="weapon-container">WPN: <span id="weapon-value">BAT [∞]</span></div>

                <div id="powerup-section">
                    <div id="active-powerup" class="hidden">
                        <div class="powerup-info">
                            <span id="powerup-icon">🩸</span>
                            <span id="powerup-text">BLOOD RAGE</span>
                        </div>
                        <div class="powerup-bar-wrapper">
                            <div id="powerup-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="mobile-controls" class="hidden">
            <div id="dpad">
                <button class="dpad-btn up" id="btn-up"></button>
                <button class="dpad-btn right" id="btn-right"></button>
                <button class="dpad-btn down" id="btn-down"></button>
                <button class="dpad-btn left" id="btn-left"></button>
                <div class="dpad-center"></div>
            </div>
            
            <div id="action-pad">
                <button class="action-btn x-btn" id="btn-x">X</button>
                <button class="action-btn y-btn" id="btn-y">Y</button>
                <button class="action-btn a-btn" id="btn-a">A</button>
                <button class="action-btn b-btn" id="btn-b">B</button>
            </div>
        </div>
        
<div id="menu-overlay">
    <div class="menu-panel">
        <h1 id="menu-title" class="gore-title">BAD MARIO</h1>
        
        <div id="menu-content">
            <div id="start-screen-prompt">
                <p class="insert-coin-text pulsate">INSERT COIN TO START</p>
                <button id="action-button" class="retro-btn main-start-btn">START MISSION</button>
                <p class="small-hint">PRESS [H] FOR CONTROLS</p>
            </div>

            <div id="menu-instructions" class="hidden">
                <p class="instruction-title">STEUERUNG:</p>
                <div class="controls-grid">
                    <p>BEWEGUNG: <span class="key-badge">W</span> <span class="key-badge">A</span> <span class="key-badge">S</span> <span class="key-badge">D</span></p>
                    <p>SPRINGEN: <span class="key-badge">SPACE</span></p>
                    <p>ANGRIFF: <span class="key-badge">F</span> / <span class="key-badge">LMB</span></p>
                    <p>WAFFEN: <span class="key-badge">1-4</span></p>
                </div>
                <button onclick="document.getElementById('menu-instructions').classList.add('hidden'); document.getElementById('start-screen-prompt').classList.remove('hidden');" class="retro-btn small-btn">BACK</button>
            </div>

            <div id="game-over-stats" class="hidden">
                <h2 class="wasted-text">WASTED</h2>
                </div>
        </div>
    </div>
</div>

                    <button id="action-button" class="retro-btn main-start-btn">INSERT COIN TO START</button>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="audio.js"></script>
    <script src="input.js"></script>
    <script src="particles.js"></script>
    <script src="sprites.js"></script>
    <script src="entities.js"></script>
    <script src="enemies.js"></script>
    <script src="player.js"></script>
    <script src="level.js"></script>
    <script src="game.js"></script>
    <script src="main.js"></script>
</body>
</html>
</body>
</html>
