<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>BAD MARIO - 16-BIT EDITION</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        
                <div id="zoom-controls">
                    <button id="btn-zoom-out"></button>
                    <button id="btn-zoom-in"></button>
                    <button id="btn-pause"></button>
                </div>
        
        <div id="hud">
            <!-- Top Left: Health & Level -->
            <div class="hud-top-left">
                <div id="hp-display">
                    <span class="hp-label">HP</span>
                    <div id="health-bar-container">
                        <div id="health-bar-fill"></div>
                    </div>
                </div>
                <div id="level-display">LEVEL: <span id="level-value">1</span></div>
            </div>

            <!-- Top Right: Score, Coins, Current Weapon -->
            <div class="hud-top-right">
                <div id="score-display">SCORE: <span id="score-value">000000</span></div>
                <div id="coin-display">COINS: <span id="coin-value">0</span></div>
                <div id="weapon-display">WPN: <span id="weapon-value">BAT [∞]</span></div>
            </div>
        </div>

        <!-- Bottom Center: Visual Inventory -->
        <div id="hud-inventory" class="hud-bottom-center">
            <!-- Wird von JS gefüllt -->
        </div>

        <div id="mobile-controls" class="hidden">
            <div id="dpad">
                <button class="dpad-btn up" id="btn-up"></button>
                <button class="dpad-btn right" id="btn-right"></button>
                <button class="dpad-btn down" id="btn-down"></button>
                <button class="dpad-btn left" id="btn-left"></button>
                <div class="dpad-center"></div>
            </div>
            
            <div id="action-pad">
                <button class="action-btn x-btn" id="btn-x">X</button>
                <button class="action-btn y-btn" id="btn-y">Y</button>
                <button class="action-btn a-btn" id="btn-a">A</button>
                <button class="action-btn b-btn" id="btn-b">B</button>
            </div>
        </div>
        
        <div id="menu-overlay">
            <div class="menu-panel">
                <h1 id="menu-title" class="gore-title">BAD MARIO</h1>
                
                <div id="start-screen-prompt">
                    <p class="insert-coin-text">CHOOSE YOUR FATE</p>
                    <div class="difficulty-box">
                        <button id="btn-princess" class="diff-btn princess">PRINCESS</button>
                        <button id="btn-regular" class="diff-btn regular">REGULAR</button>
                        <button id="btn-badass" class="diff-btn badass">BADASS</button>
                    </div>
                </div>

                <div id="game-over-stats" class="hidden">
                    <h2 class="wasted-text">WASTED</h2>
                    <p>FINAL SCORE: <span id="final-score" style="color:#FFD700">0</span></p>
                    <p>LEVEL REACHED: <span id="final-level" style="color:#0FF">1</span></p>
                    
                    <p style="margin-top:30px; color:#888;">TRY AGAIN?</p>
                    <div class="difficulty-box">
                        <!-- Restart Buttons direkt im Game Over Screen -->
                        <button id="restart-princess" class="diff-btn princess">PRINCESS</button>
                        <button id="restart-regular" class="diff-btn regular">REGULAR</button>
                        <button id="restart-badass" class="diff-btn badass">BADASS</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="audio.js"></script>
    <script src="input.js"></script>
    <script src="particles.js"></script>
    <script src="sprites.js"></script>
    <script src="entities.js"></script>
    <script src="enemies.js"></script>
    <script src="player.js"></script>
    <script src="level.js"></script>
    <script src="game.js"></script>
</body>
</html>
