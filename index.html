<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BAD MARIO - 16-BIT EDITION</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <!-- Haupt-Layer (Multi-Layer-Parallax & Rendering via JS) -->
        <canvas id="gameCanvas"></canvas>
        
        <!-- Post-Processing & Retro CRT Effekte -->
        <div id="crt-overlay"></div>
        
        <!-- UI Layer (Striktes HUD, nur 1x im DOM, gesteuert via CSS/JS) -->
        <div id="hud">
            <!-- HUD Top: Health & Score -->
            <div class="hud-top">
                <!-- Moderne Lebensbalken-Struktur im Dark-Retro-Look -->
                <div id="hp-display">
                    <span class="hp-label">HP</span>
                    <div id="health-bar-container">
                        <div id="health-bar-fill"></div>
                    </div>
                </div>
                
                <div id="level-display">LEVEL: <span id="level-value">1</span></div>

                <!-- Punkte / Coins Container -->
                <div id="score-container">
                    <div id="score-display">SCORE: <span id="score-value">000000</span></div>
                    <div id="coin-display">COINS: <span id="coin-value">0</span></div>
                </div>
            </div>

            <!-- HUD Bottom: Weapons & Powerups -->
            <div class="hud-bottom">
                <!-- Weapon HUD (Statische Simple Anzeige wie gefordert) -->
                <div id="weapon-container">WPN: <span id="weapon-value">BAT [∞]</span></div>

                <!-- Bereich für temporäre Power-Ups/Überraschungen -->
                <div id="powerup-section">
                    <div id="active-powerup" class="hidden">
                        <div class="powerup-info">
                            <span id="powerup-icon">🩸</span>
                            <span id="powerup-text">BLOOD RAGE</span>
                        </div>
                        <div class="powerup-bar-wrapper">
                            <div id="powerup-bar-fill"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Menü Layer -->
        <div id="menu-overlay">
            <div class="menu-panel">
                <h1 id="menu-title" class="gore-title">BAD MARIO</h1>
                <div id="menu-content">
                    <!-- Start Screen Instructions -->
                    <div id="menu-instructions">
                        <p class="instruction-title">STEUERUNG:</p>
                        <p>BEWEGUNG: <span class="key-badge">W</span> <span class="key-badge">A</span> <span class="key-badge">S</span> <span class="key-badge">D</span></p>
                        <p>SPRINGEN: <span class="key-badge">SPACE</span></p>
                        <p>ANGRIFF: <span class="key-badge">F</span> / <span class="key-badge">LMB</span></p>
                        <p>WAFFENWECHSEL: <span class="key-badge">1-4</span></p>
                    </div>

                    <!-- Game Over / Respawn Screen (NEU: Continue-Mechanik) -->
                    <div id="game-over-stats" class="hidden">
                        <h2 class="wasted-text">WASTED</h2>
                        <div class="stats-grid">
                            <p>LEVEL REACHED: <span id="final-level" class="blood-text">1</span></p>
                            <p>FINAL SCORE: <span id="final-score">0</span></p>
                            <p>COINS COLLECTED: <span id="final-coins">0</span></p>
                        </div>
                        
                        <!-- Respawn / Continue Options -->
                        <div id="respawn-options">
                            <p id="continue-hint" class="retro-highlight pulsate">-> CONTINUE MISSION? <-</p>
                            <div class="action-buttons">
                                <button id="continue-btn" class="retro-btn gore-btn">
                                    CONTINUE IN LEVEL X
                                    <span class="btn-subtext">COST: 50 COINS</span>
                                </button>
                                <button id="restart-btn" class="retro-btn dark-btn">
                                    ABORT & RESTART
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- Initiale Start-Aktion -->
                    <button id="action-button" class="retro-btn main-start-btn">INSERT COIN TO START</button>
                </div>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
